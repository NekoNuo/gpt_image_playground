server {
    listen ${HOST}:${PORT};
    server_name _;

    root /usr/share/nginx/html;
    index index.html;
    client_max_body_size 600m;

    # gzip 压缩
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 256;

    # 静态资源长缓存（Vite 生成的带 hash 文件名）
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # BEGIN API PROXY
    # API 代理。前端请求同源 /api-proxy/...，由 Nginx 转发到部署时配置的 API_URL。
    resolver 1.1.1.1 8.8.8.8 ipv6=off valid=300s;
    resolver_timeout 5s;

    location = /api-proxy/__capabilities {
        default_type application/json;
        add_header Cache-Control "no-store";
        return 200 '{"available":true,"dynamicTarget":true}';
    }

    location ~* ^/api-proxy/((v1/)?(images/generations|images/edits|responses))$ {
        limit_except POST OPTIONS {
            deny all;
        }

        set $upstream_target ${API_URL};
        if ($http_x_api_proxy_target != "") {
            set $upstream_target $http_x_api_proxy_target;
        }
        if ($upstream_target !~* ^https?://[^?#]+$) {
            return 400 "Bad Request: invalid API proxy target";
        }

        proxy_pass $upstream_target/$1$is_args$args;
        proxy_http_version 1.1;
        proxy_set_header Host $proxy_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_ssl_server_name on;
        proxy_connect_timeout 60s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
        proxy_request_buffering off;
    }

    location /api-proxy/ {
        return 403 "Forbidden: API Proxy path restricted";
    }
    # END API PROXY

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
